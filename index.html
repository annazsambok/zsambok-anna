<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zsámbok Anna – Sportfotó Portfólió</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #fafafa;
      color: #222;
    }

    header {
      text-align: center;
      padding: 50px 0 10px;
      font-size: 2.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      font-family: "Brush Script MT", cursive;
      color: #111;
    }

    .contact {
      text-align: center;
      margin-bottom: 30px;
      color: #666;
      font-size: 1rem;
    }

    nav {
      text-align: center;
      margin-bottom: 35px;
    }

    nav button {
      background: #fff;
      border: 1px solid #ddd;
      padding: 10px 18px;
      border-radius: 25px;
      font-size: 0.95rem;
      margin: 0 10px;
      cursor: pointer;
      color: #444;
      transition: all 0.3s ease;
    }

    nav button:hover {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
      padding: 20px 40px 60px;
    }

    .gallery img {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      pointer-events: none; /* NEM kattintható */
    }

    .gallery img:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 25px rgba(0,0,0,0.18);
    }
  </style>
</head>

<body>

  <header>Zsámbok Anna</header>

  <div class="contact">
    Email: <strong>EMAIL_CÍMED</strong> • Instagram: <strong>@INSTAGRAMOD</strong> • Telefon: <strong>TELEFON</strong>
  </div>

  <nav>
    <button onclick="filterImages('all')">Összes</button>
    <button onclick="filterImages('kezilabda')">Kézilabda</button>
    <button onclick="filterImages('diakolimpia')">Diákolimpia</button>
    <button onclick="filterImages('rendezveny')">Rendezvények</button>
    <button onclick="filterImages('eskuvo')">Esküvő</button>
  </nav>

  <section class="gallery">

    <!-- Kézilabda -->
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="kezilabda">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="kezilabda">

    <!-- Diákolimpia -->
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="diakolimpia">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="diakolimpia">

    <!-- Rendezvény -->
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="rendezveny">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="rendezveny">

    <!-- Esküvő -->
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="eskuvo">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="eskuvo">

  </section>

  <script>
    function filterImages(category) {
      const images = document.querySelectorAll('.gallery img');
      images.forEach(img => {
        img.style.display = (category === 'all' || img.classList.contains(category)) ? 'block' : 'none';
      });
    }
  </script>

</body>
</html>
