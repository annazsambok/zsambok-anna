<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zsámbok Anna – Fotográfus</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f3e9dd; /* bézs */
      color: #222;
    }

    /* HERO SZEKCIÓ – csak a neved */
    .hero {
      background: #0d0d0d; /* fekete */
      color: #f3e9dd;      /* bézs */
      padding: 90px 20px 50px; /* kisebb fejléc */
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      font-family: "Brush Script MT", cursive;
      margin-bottom: 10px;
    }

    /* KAPCSOLAT – neved alatt, mobilon sem törik szét */
    .contact {
      text-align: center;
      margin-top: 15px;
      font-size: 1.05rem;
      color: #333;
      white-space: nowrap; /* NEM törik szét */
    }

    /* Mobilon kisebb betűméret, hogy biztosan egy sorban maradjon */
    @media (max-width: 600px) {
      .contact {
        font-size: 0.85rem;
      }
    }

    /* KATEGÓRIA GOMBOK – mobilbarát, nem csúszik össze */
    nav {
      text-align: center;
      margin: 30px 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    nav button {
      background: #0d0d0d;
      color: #f3e9dd;
      border: none;
      padding: 12px 22px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
      min-width: 120px;
      text-align: center;
    }

    nav button:hover {
      background: #333;
    }

    /* MASONRY (random hatású) GALÉRIA */
    .gallery {
      column-count: 3;
      column-gap: 20px;
      padding: 20px 40px 60px;
    }

    .gallery img {
      width: 100%;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
      transition: transform 0.3s ease;
      pointer-events: none; /* nem kattintható */
    }

    .gallery img:hover {
      transform: scale(1.02);
    }

    @media (max-width: 900px) {
      .gallery {
        column-count: 2;
      }
    }

    @media (max-width: 600px) {
      .gallery {
        column-count: 1;
      }
    }
  </style>
</head>

<body>

  <!-- HERO – fekete sáv, csak a neved -->
  <div class="hero">
    <h1>Zsámbok Anna</h1>
  </div>

  <!-- KAPCSOLAT – neved alatt, mobilon sem törik szét -->
  <div class="contact">
    Email: <strong>zsambokanna@gmail.com</strong> • 
    Telefon: <strong>+36 30 743 3533</strong> • 
    Instagram: <strong>zsambokanna</strong>
  </div>

  <!-- KATEGÓRIÁK – választható menü -->
  <nav>
    <button onclick="filterImages('all')">Összes</button>
    <button onclick="filterImages('kezilabda')">Kézilabda</button>
    <button onclick="filterImages('diakolimpia')">Diákolimpia</button>
    <button onclick="filterImages('rendezveny')">Rendezvények</button>
    <button onclick="filterImages('eskuvo')">Esküvő</button>
  </nav>

  <!-- GALÉRIA – random hatású elrendezés -->
  <section class="gallery">

    <!-- Kézilabda -->
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="kezilabda">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="kezilabda">

    <!-- Diákolimpia -->
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="diakolimpia">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="diakolimpia">

    <!-- Rendezvény -->
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="rendezveny">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="rendezveny">

    <!-- Esküvő -->
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="eskuvo">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="eskuvo">

  </section>

  <script>
    function filterImages(category) {
      const images = document.querySelectorAll('.gallery img');
      images.forEach(img => {
        img.style.display = (category === 'all' || img.classList.contains(category)) ? 'block' : 'none';
      });
    }
  </script>

</body>
</html>
