<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zsámbok Anna – Fotográfus</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f3e9dd; /* bézs */
      color: #222;
    }

    /* HERO – név + egy soros elérhetőség */
    .hero {
      background: #0d0d0d;
      color: #f3e9dd;
      padding: 70px 20px 45px; /* picit magasabb */
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      font-family: "Brush Script MT", cursive;
      margin-bottom: 18px; /* kicsit fentebb */
    }

    /* Egy soros elérhetőség ikonokkal */
    .contact-line {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px; /* elegáns távolság */
      flex-wrap: nowrap;
      white-space: nowrap;
      font-size: 0.85rem;
      color: #f3e9dd;
    }

    .contact-line span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .contact-line svg {
      width: 16px;
      height: 16px;
      stroke: #f3e9dd;
      fill: none;
      stroke-width: 2;
    }

    @media (max-width: 600px) {
      .contact-line {
        font-size: 0.75rem; /* mobilon kisebb, hogy kiférjen */
        gap: 16px;
      }
      .contact-line svg {
        width: 14px;
        height: 14px;
      }
    }

    /* KATEGÓRIA GOMBOK */
    nav {
      text-align: center;
      margin: 25px 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    nav button {
      background: #0d0d0d;
      color: #f3e9dd;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      min-width: 110px;
    }

    nav button:hover {
      background: #333;
    }

    /* GALÉRIA */
    .gallery {
      column-count: 3;
      column-gap: 20px;
      padding: 20px 40px 80px;
    }

    .gallery img {
      width: 100%;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
      pointer-events: none;
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.02);
    }

    @media (max-width: 900px) {
      .gallery { column-count: 2; }
    }

    @media (max-width: 600px) {
      .gallery { column-count: 1; }
    }
  </style>
</head>

<body>

  <!-- HERO – név + egy soros elérhetőség -->
  <div class="hero">
    <h1>Zsámbok Anna</h1>

    <div class="contact-line">

      <!-- Email ikon -->
      <span>
        <svg viewBox="0 0 24 24">
          <path d="M4 4h16v16H4z"/>
          <path d="M4 4l8 8 8-8"/>
        </svg>
        zsambokanna@gmail.com
      </span>

      <!-- Telefon ikon -->
      <span>
        <svg viewBox="0 0 24 24">
          <path d="M6 2l4 2-2 4c1 2 3 4 5 5l4-2 2 4c-1 1-3 3-5 3-6 0-12-6-12-12 0-2 2-4 3-5z"/>
        </svg>
        +36 30 743 3533
      </span>

      <!-- Instagram ikon -->
      <span>
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17" cy="7" r="1.5"/>
        </svg>
        zsambokanna
      </span>

    </div>
  </div>

  <!-- MENÜ -->
  <nav>
    <button onclick="filterImages('all')">Összes</button>
    <button onclick="filterImages('kezilabda')">Kézilabda</button>
    <button onclick="filterImages('diakolimpia')">Diákolimpia</button>
    <button onclick="filterImages('rendezveny')">Rendezvények</button>
    <button onclick="filterImages('eskuvo')">Esküvő</button>
  </nav>

  <!-- GALÉRIA -->
  <section class="gallery">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="kezilabda">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="kezilabda">

    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="diakolimpia">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="diakolimpia">

    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="rendezveny">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="rendezveny">

    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="eskuvo">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="eskuvo">
  </section>

  <script>
    function filterImages(category) {
      const images = document.querySelectorAll('.gallery img');
      images.forEach(img => {
        img.style.display = (category === 'all' || img.classList.contains(category)) ? 'block' : 'none';
      });
    }
  </script>

</body>
</html>
