<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zsámbok Anna – Sportfotó Portfólió</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      color: #222;
    }

    header {
      text-align: center;
      padding: 40px 0 10px;
      font-size: 2.4rem;
      font-weight: 600;
      font-family: "Brush Script MT", cursive;
    }

    .contact {
      text-align: center;
      margin-bottom: 20px;
      color: #555;
      font-size: 0.95rem;
    }

    nav {
      text-align: center;
      margin-bottom: 25px;
    }

    nav button {
      background: none;
      border: none;
      font-size: 1rem;
      margin: 0 15px;
      cursor: pointer;
      color: #555;
      font-weight: 500;
    }

    nav button:hover {
      color: #000;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 4px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.03);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .lightbox img {
      max-width: 95%;
      max-height: 95%;
      border-radius: 6px;
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 3rem;
      color: white;
      cursor: pointer;
      user-select: none;
    }

    .left-arrow {
      left: 20px;
    }

    .right-arrow {
      right: 20px;
    }
  </style>
</head>

<body>

  <header>Zsámbok Anna</header>

  <div class="contact">
    Email: <strong>EMAIL_CÍMED</strong> • Instagram: <strong>@INSTAGRAMOD</strong> • Telefon: <strong>TELEFON</strong>
  </div>

  <nav>
    <button onclick="filterImages('all')">Összes</button>
    <button onclick="filterImages('kezilabda')">Kézilabda</button>
    <button onclick="filterImages('diakolimpia')">Diákolimpia</button>
    <button onclick="filterImages('rendezveny')">Rendezvények</button>
    <button onclick="filterImages('eskuvo')">Esküvő</button>
  </nav>

  <section class="gallery">

    <!-- Kézilabda -->
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="kezilabda">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="kezilabda">

    <!-- Diákolimpia -->
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="diakolimpia">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="diakolimpia">

    <!-- Rendezvény -->
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="rendezveny">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="rendezveny">

    <!-- Esküvő -->
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="eskuvo">
    <img src="https://res.cloudinary.com/dgvyhfj3x/image/upload/v1782749164/186A1384_aqhwax.jpg" class="eskuvo">

  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="nav-arrow left-arrow" id="prev">&#10094;</span>
    <img id="lightbox-img" src="">
    <span class="nav-arrow right-arrow" id="next">&#10095;</span>
  </div>

  <script>
    function filterImages(category) {
      const images = document.querySelectorAll('.gallery img');

      images.forEach(img => {
        img.style.display = (category === 'all' || img.classList.contains(category)) ? 'block' : 'none';
      });
    }

    const galleryImages = Array.from(document.querySelectorAll('.gallery img'));
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    let currentIndex = 0;

    function showImage(index) {
      currentIndex = index;
      lightboxImg.src = galleryImages[index].src;
      lightbox.style.display = 'flex';
    }

    galleryImages.forEach((img, index) => {
      img.addEventListener('click', () => showImage(index));
    });

    document.getElementById('prev').addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
      showImage(currentIndex);
    });

    document.getElementById('next').addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % galleryImages.length;
      showImage(currentIndex);
    });

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) lightbox.style.display = 'none';
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') lightbox.style.display = 'none';
      if (e.key === 'ArrowLeft') document.getElementById('prev').click();
      if (e.key === 'ArrowRight') document.getElementById('next').click();
    });
  </script>

</body>
</html>
